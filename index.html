<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
  <title>Ceap Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f5f0e8;
      --surface:      #fffcf5;
      --border:       #e0d8c8;
      --text:         #2a2118;
      --muted:        #9c8f7e;
      --accent:       #c0392b;
      --bubble-me:    #2a2118;
      --bubble-other: #ffffff;
      --radius:       12px;
      --font:         'Outfit', sans-serif;
      --mono:         'JetBrains Mono', monospace;
    }

    /* 100dvh: respeita a barra do navegador mobile corretamente */
    html, body {
      height: 100%;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      /* Garante que o body nunca fica menor que a tela */
      min-height: 100dvh;
      max-height: 100dvh;
    }

    /* ── Cabeçalho ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 10px;
      /* Safe area para notch no topo (iPhone) */
      padding-top: max(12px, env(safe-area-inset-top));
    }
    .logo {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -.02em;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .logo-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      animation: pulse 2.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(192,57,43,.4); }
      50%      { box-shadow: 0 0 0 7px rgba(192,57,43,0); }
    }
    .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .status-pill {
      font-family: var(--mono);
      font-size: .65rem;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: .04em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .status-pill.connected    { background: #d1fae5; color: #065f46; }
    .status-pill.disconnected { background: #fee2e2; color: #991b1b; }
    .status-pill.connecting   { background: #fef3c7; color: #92400e; }

    .header-btn {
      display: none;
      align-items: center;
      gap: 6px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 6px 11px 6px 8px;
      cursor: pointer;
      font-family: var(--font);
      font-size: .8rem;
      font-weight: 600;
      color: var(--text);
      transition: all .18s;
      white-space: nowrap;
      /* Área de toque mínima para mobile */
      min-height: 36px;
    }
    .header-btn:hover { background: var(--border); }
    .header-btn .btn-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    #game-btn { border-color: #c0392b44; }
    #game-btn:hover { background: #fdecea; border-color: var(--accent); }

    /* ── Tela de entrada ───────────────────────────────────── */
    #join-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
    }
    .join-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-shadow: 0 4px 40px rgba(0,0,0,.07);
    }
    .join-card h2 { font-size: 1.8rem; font-weight: 800; line-height: 1.1; letter-spacing: -.04em; }
    .join-card h2 span { color: var(--accent); }
    .join-card p { font-size: .85rem; color: var(--muted); line-height: 1.6; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: .7rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); }
    .field input {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      /* 16px mínimo evita zoom automático no iOS */
      font-size: 1rem;
      padding: 13px 14px;
      outline: none;
      transition: border-color .2s;
      width: 100%;
      -webkit-appearance: none;
    }
    .field input:focus { border-color: var(--accent); }
    .btn-primary {
      padding: 14px 20px;
      border-radius: var(--radius);
      font-family: var(--font);
      font-weight: 700;
      font-size: .95rem;
      cursor: pointer;
      border: none;
      background: var(--accent);
      color: #fff;
      transition: all .18s;
      -webkit-appearance: none;
    }
    .btn-primary:hover   { background: #a93226; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Layout do chat ────────────────────────────────────── */
    #chat-screen {
      flex: 1;
      display: none;
      overflow: hidden;
      /* Permite que o chat encolha quando o teclado abre no mobile */
      min-height: 0;
    }
    #chat-screen.active { display: flex; }
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
      min-height: 0;
    }

    /* ── Mensagens ─────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
      /* Impede que o scroll trave no iOS */
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .system-msg {
      text-align: center;
      font-size: .7rem;
      font-family: var(--mono);
      color: var(--muted);
      padding: 4px 0 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .system-msg::before, .system-msg::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .msg { display: flex; flex-direction: column; gap: 3px; max-width: 82%; }
    .msg.mine  { align-self: flex-end;   align-items: flex-end; }
    .msg.other { align-self: flex-start; align-items: flex-start; }
    .msg-meta { display: flex; align-items: baseline; gap: 6px; font-size: .7rem; color: var(--muted); font-family: var(--mono); }
    .msg-name { font-weight: 600; font-size: .76rem; }
    .msg-bubble {
      padding: 9px 13px;
      border-radius: 16px;
      font-size: .9rem;
      line-height: 1.55;
      word-break: break-word;
      position: relative;
      cursor: pointer;
    }
    .msg.mine  .msg-bubble { background: var(--bubble-me);    color: #fff;        border-radius: 16px 4px 16px 16px; }
    .msg.other .msg-bubble { background: var(--bubble-other); color: var(--text); border-radius: 4px 16px 16px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }

    /* Dica de resposta (hover no desktop, toque no mobile) */
    .reply-hint {
      position: absolute;
      top: -18px;
      font-size: .62rem;
      font-family: var(--mono);
      color: var(--muted);
      opacity: 0;
      transition: opacity .15s;
      white-space: nowrap;
      pointer-events: none;
    }
    .msg.mine  .reply-hint { right: 4px; }
    .msg.other .reply-hint { left: 4px; }
    .msg-bubble:hover .reply-hint { opacity: 1; }
    /* No mobile a dica fica sempre visível para indicar que é clicável */
    @media (hover: none) { .reply-hint { opacity: .5 !important; } }

    /* Citação dentro da bolha */
    .reply-quote {
      font-size: .75rem;
      font-family: var(--mono);
      opacity: .7;
      border-left: 2px solid currentColor;
      padding: 3px 8px;
      margin-bottom: 5px;
      border-radius: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 220px;
    }

    /* Preview de resposta acima do input */
    #reply-preview {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: .8rem;
      font-family: var(--mono);
      color: var(--muted);
      flex-shrink: 0;
    }
    #reply-preview.show { display: flex; }
    #reply-preview-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #reply-preview-text strong { color: var(--text); }
    #reply-cancel { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1.1rem; padding: 4px 6px; transition: color .15s; flex-shrink: 0; min-width: 32px; min-height: 32px; }
    #reply-cancel:hover { color: var(--accent); }

    /* ── Campo de digitação ────────────────────────────────── */
    .input-area {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #msg-input {
      flex: 1;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      /* 16px evita zoom automático no iOS ao focar */
      font-size: 1rem;
      padding: 11px 13px;
      outline: none;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      line-height: 1.5;
      overflow-y: auto;
      transition: border-color .2s;
      -webkit-appearance: none;
      /* Força o textarea a não sumir atrás do teclado */
      position: relative;
      z-index: 1;
    }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--muted); }
    #send-btn {
      padding: 11px 16px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .18s;
      /* Área de toque mínima */
      min-width: 44px;
      min-height: 44px;
    }
    #send-btn:hover { background: #a93226; }

    /* ── Overlay (fundo escuro dos modais/drawers) ──────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 10;
      animation: fadeIn .2s ease;
    }
    .overlay.show { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ── Drawer de usuários (direita) ──────────────────────── */
    #users-drawer {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: min(240px, 85vw);
      background: var(--surface);
      border-left: 1px solid var(--border);
      box-shadow: -4px 0 24px rgba(0,0,0,.1);
      z-index: 11;
      display: flex;
      flex-direction: column;
      padding: 20px 14px;
      padding-top: max(20px, env(safe-area-inset-top));
      gap: 4px;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
    }
    #users-drawer.open { transform: translateX(0); }
    .drawer-header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-bottom: 8px; flex-shrink: 0; }
    .drawer-title { font-size: .68rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .drawer-close { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1.1rem; padding: 4px 8px; border-radius: 4px; transition: all .15s; min-width: 36px; min-height: 36px; }
    .drawer-close:hover { background: var(--bg); color: var(--text); }
    .user-item { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 8px; font-size: .85rem; transition: background .15s; }
    .user-item:hover { background: var(--bg); }
    .user-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .user-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .user-name.me { font-weight: 700; }
    .admin-badge { font-size: .58rem; font-weight: 700; background: #fdecea; color: var(--accent); border-radius: 4px; padding: 2px 5px; text-transform: uppercase; flex-shrink: 0; }

    /* ── Modal do jogo (pop-up central) ────────────────────── */
    /* Aparece no centro da tela, diferente do drawer lateral */
    #game-modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #game-modal.show { display: flex; }

    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 8px 48px rgba(0,0,0,.18);
      width: 100%;
      max-width: 440px;
      max-height: 90dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: modalIn .22s ease;
      position: relative;
      z-index: 1;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(.95) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Cabeçalho do modal */
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .modal-title { font-size: 1.05rem; font-weight: 800; letter-spacing: -.02em; }
    .modal-title span { color: var(--accent); }
    .modal-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1.1rem;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all .15s;
      min-width: 36px;
      min-height: 36px;
    }
    .modal-close:hover { background: var(--bg); color: var(--text); }

    /* Corpo do modal com scroll */
    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      -webkit-overflow-scrolling: touch;
    }

    .section-label {
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Textarea para colar lista */
    #word-textarea {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: .85rem;
      padding: 10px 12px;
      outline: none;
      resize: none;
      height: 100px;
      line-height: 1.7;
      width: 100%;
      transition: border-color .2s;
      -webkit-appearance: none;
    }
    #word-textarea:focus { border-color: var(--accent); }
    #word-textarea::placeholder { color: var(--muted); }

    /* Botões importar + resetar */
    .word-actions { display: flex; gap: 8px; }
    .word-actions button {
      flex: 1;
      padding: 10px 8px;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: .83rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s;
      min-height: 42px;
    }
    #add-word-btn  { background: var(--accent); color: #fff; }
    #add-word-btn:hover  { background: #a93226; }
    #reset-words-btn { background: var(--bg); color: var(--muted); border: 1.5px solid var(--border) !important; }
    #reset-words-btn:hover { border-color: var(--accent) !important; color: var(--accent); background: #fdecea; }

    /* Lista de palavras */
    #word-list-admin { display: flex; flex-wrap: wrap; gap: 6px; }
    .word-tag {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 8px 4px 10px;
      font-size: .82rem;
    }
    .word-tag-remove {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: .8rem;
      line-height: 1;
      padding: 2px 3px;
      border-radius: 50%;
      transition: all .15s;
      min-width: 24px;
      min-height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .word-tag-remove:hover { color: var(--accent); background: #fdecea; }

    /* Separador */
    .divider { height: 1px; background: var(--border); }

    /* ── Seletor de impostores ──────────────────────────────── */
    .impostor-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .impostor-label { font-size: .88rem; font-weight: 600; }
    .impostor-label small { display: block; font-size: .72rem; color: var(--muted); font-weight: 400; }
    /* Stepper: botões − e + com número no meio */
    .stepper {
      display: flex;
      align-items: center;
      gap: 0;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .stepper button {
      background: var(--bg);
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 0;
      width: 40px;
      height: 40px;
      color: var(--text);
      transition: background .15s;
      flex-shrink: 0;
    }
    .stepper button:hover { background: var(--border); }
    .stepper button:disabled { color: var(--muted); cursor: not-allowed; }
    #impostor-count-display {
      width: 40px;
      text-align: center;
      font-family: var(--mono);
      font-size: .95rem;
      font-weight: 700;
      color: var(--accent);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      padding: 0 4px;
      height: 40px;
      line-height: 40px;
    }

    /* Erro do jogo */
    #game-error {
      font-size: .8rem;
      color: var(--accent);
      font-family: var(--mono);
      display: none;
      padding: 8px 10px;
      background: #fdecea;
      border-radius: 8px;
    }
    #game-error.show { display: block; }

    /* Rodapé do modal com botões de ação */
    .modal-footer {
      padding: 14px 20px;
      padding-bottom: max(14px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }
    #start-game-btn {
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-family: var(--font);
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s;
      text-align: center;
      min-height: 48px;
    }
    #start-game-btn:hover { background: #a93226; }
    #end-game-btn {
      display: none;
      padding: 12px;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-family: var(--font);
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s;
      text-align: center;
      min-height: 44px;
    }
    #end-game-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Tela de revelação ─────────────────────────────────── */
    #reveal-screen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 30;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #0d0d0d;
      animation: fadeIn .3s ease;
    }
    #reveal-screen.show { display: flex; }
    #reveal-screen.impostor { background: #1a0000; }
    .reveal-card { display: flex; flex-direction: column; align-items: center; gap: 18px; text-align: center; max-width: 380px; width: 100%; }
    .reveal-role { font-size: .72rem; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; opacity: .6; }
    .reveal-word { font-size: 2.8rem; font-weight: 800; letter-spacing: -.04em; line-height: 1; }
    .reveal-hint { font-size: .88rem; opacity: .6; line-height: 1.6; max-width: 280px; }
    .reveal-card.player { color: #fff; }
    .reveal-card.player .reveal-word { color: #fbbf24; }
    .reveal-card.impostor { color: #fff; }
    .reveal-card.impostor .reveal-word { color: #f87171; }
    .reveal-close {
      margin-top: 6px;
      padding: 13px 32px;
      background: rgba(255,255,255,.15);
      border: 1.5px solid rgba(255,255,255,.25);
      border-radius: 20px;
      color: #fff;
      font-family: var(--font);
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .18s;
      min-height: 48px;
    }
    .reveal-close:hover { background: rgba(255,255,255,.25); }

    /* ── Responsividade mobile ─────────────────────────────── */
    @media (max-width: 480px) {
      header { padding: 10px 12px; }
      .logo { font-size: 1rem; }
      #status-pill { display: none; }

      .join-card { padding: 28px 20px; gap: 16px; border-radius: 16px; }
      .join-card h2 { font-size: 1.5rem; }

      #messages { padding: 12px; }
      .msg { max-width: 88%; }

      .input-area { padding: 8px 10px; padding-bottom: max(8px, env(safe-area-inset-bottom)); gap: 6px; }

      .modal-box { border-radius: 16px; max-height: 92dvh; }
      .modal-header { padding: 14px 16px 12px; }
      .modal-body { padding: 14px 16px; }
      .modal-footer { padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); }

      .reveal-word { font-size: 2.2rem; }
      .reveal-hint { font-size: .82rem; }
    }
  </style>
</head>
<body>

<!-- ── Cabeçalho ───────────────────────────────────────────── -->
<header>
  <div class="logo">
    <span class="logo-dot"></span>
    Ceap Chat
  </div>
  <div class="header-right">
    <span id="status-pill" class="status-pill disconnected">Desconectado</span>

    <!-- Botão que abre o modal do jogo (só para admin) -->
    <button class="header-btn" id="game-btn">
      <span class="btn-dot" style="background:var(--accent)"></span>
      <span>Impostor</span>
    </button>

    <!-- Botão que abre o drawer de usuários -->
    <button class="header-btn" id="users-toggle">
      <span class="btn-dot" style="background:#22c55e"></span>
      <span id="users-count">0 online</span>
    </button>
  </div>
</header>

<!-- ── Overlay (fundo escuro) ───────────────────────────────── -->
<div class="overlay" id="overlay"></div>

<!-- ── Drawer de usuários (direita) ────────────────────────── -->
<div id="users-drawer">
  <div class="drawer-header">
    <span class="drawer-title">Online agora</span>
    <button class="drawer-close" id="users-close">✕</button>
  </div>
  <div id="user-list"></div>
</div>

<!-- ── Modal do jogo do Impostor (centro da tela) ───────────── -->
<div id="game-modal">
  <div class="modal-box">

    <!-- Cabeçalho do modal -->
    <div class="modal-header">
      <span class="modal-title">🕵️ Jogo do <span>Impostor</span></span>
      <button class="modal-close" id="game-modal-close">✕</button>
    </div>

    <!-- Corpo com scroll -->
    <div class="modal-body">

      <!-- Palavras: textarea para colar lista -->
      <span class="section-label">Palavras (cole uma por linha)</span>
      <textarea id="word-textarea" placeholder="Futebol&#10;Música&#10;Viagem&#10;Cinema&#10;..."></textarea>
      <div class="word-actions">
        <button id="add-word-btn">⬆ Importar lista</button>
        <button id="reset-words-btn">🗑 Resetar</button>
      </div>

      <!-- Lista de palavras já importadas -->
      <span class="section-label">Palavras na lista</span>
      <div id="word-list-admin">
        <span style="font-size:.78rem;color:var(--muted);font-family:var(--mono)">Nenhuma palavra ainda.</span>
      </div>

      <div class="divider"></div>

      <!-- Seletor de quantidade de impostores -->
      <div class="impostor-row">
        <div class="impostor-label">
          Nº de impostores
          <small>Máximo: metade dos jogadores</small>
        </div>
        <div class="stepper">
          <button id="impostor-dec" title="Diminuir">−</button>
          <span id="impostor-count-display">1</span>
          <button id="impostor-inc" title="Aumentar">+</button>
        </div>
      </div>

      <!-- Erro -->
      <div id="game-error"></div>

    </div>

    <!-- Rodapé com botões de ação -->
    <div class="modal-footer">
      <button id="start-game-btn">🎮 Iniciar Jogo do Impostor</button>
      <button id="end-game-btn">Encerrar jogo</button>
    </div>
  </div>
</div>

<!-- ── Tela de entrada ──────────────────────────────────────── -->
<div id="join-screen">
  <div class="join-card">
    <h2>Bem-vindo ao<br/><span>Ceap Chat</span></h2>
    <p>Chat em tempo real entre alunos. Escolha um nome para entrar.</p>
    <div class="field">
      <label>Seu nome</label>
      <input id="name-input" type="text" placeholder="Ex: João" maxlength="20" autocomplete="off" />
    </div>
    <button class="btn-primary" id="join-btn">Entrar no chat →</button>
  </div>
</div>

<!-- ── Tela de chat ─────────────────────────────────────────── -->
<div id="chat-screen">
  <div class="chat-main">
    <div id="messages"></div>

    <!-- Preview de resposta -->
    <div id="reply-preview">
      <span>↩</span>
      <span id="reply-preview-text"></span>
      <button id="reply-cancel">✕</button>
    </div>

    <div class="input-area">
      <textarea id="msg-input" placeholder="Digite uma mensagem..." rows="1"></textarea>
      <button id="send-btn">➤</button>
    </div>
  </div>
</div>

<!-- ── Tela de revelação ────────────────────────────────────── -->
<div id="reveal-screen">
  <div class="reveal-card" id="reveal-card">
    <span class="reveal-role" id="reveal-role"></span>
    <span class="reveal-word" id="reveal-word"></span>
    <span class="reveal-hint" id="reveal-hint"></span>
    <button class="reveal-close" id="reveal-close">Entendi →</button>
  </div>
</div>

<script>
  // ── Referências ────────────────────────────────────────────
  const joinScreen       = document.getElementById("join-screen");
  const chatScreen       = document.getElementById("chat-screen");
  const nameInput        = document.getElementById("name-input");
  const joinBtn          = document.getElementById("join-btn");
  const statusPill       = document.getElementById("status-pill");
  const messagesEl       = document.getElementById("messages");
  const msgInput         = document.getElementById("msg-input");
  const sendBtn          = document.getElementById("send-btn");
  const userListEl       = document.getElementById("user-list");
  const usersCount       = document.getElementById("users-count");
  const overlay          = document.getElementById("overlay");
  const usersDrawer      = document.getElementById("users-drawer");
  const usersToggle      = document.getElementById("users-toggle");
  const usersClose       = document.getElementById("users-close");
  const gameModal        = document.getElementById("game-modal");
  const gameBtn          = document.getElementById("game-btn");
  const gameModalClose   = document.getElementById("game-modal-close");
  const wordTextarea     = document.getElementById("word-textarea");
  const addWordBtn       = document.getElementById("add-word-btn");
  const resetWordsBtn    = document.getElementById("reset-words-btn");
  const wordListAdmin    = document.getElementById("word-list-admin");
  const startGameBtn     = document.getElementById("start-game-btn");
  const endGameBtn       = document.getElementById("end-game-btn");
  const gameError        = document.getElementById("game-error");
  const impostorDec      = document.getElementById("impostor-dec");
  const impostorInc      = document.getElementById("impostor-inc");
  const impostorDisplay  = document.getElementById("impostor-count-display");
  const revealScreen     = document.getElementById("reveal-screen");
  const revealCard       = document.getElementById("reveal-card");
  const revealRole       = document.getElementById("reveal-role");
  const revealWord       = document.getElementById("reveal-word");
  const revealHint       = document.getElementById("reveal-hint");
  const revealClose      = document.getElementById("reveal-close");
  const replyPreview     = document.getElementById("reply-preview");
  const replyPreviewText = document.getElementById("reply-preview-text");
  const replyCancel      = document.getElementById("reply-cancel");

  // ── Estado local ───────────────────────────────────────────
  let ws           = null;
  let myName       = "";
  let isAdmin      = false;
  let replyTarget  = null;  // { from, text } da mensagem sendo respondida
  let numImpostores = 1;    // quantidade de impostores selecionada

  // ── Status ─────────────────────────────────────────────────
  function setStatus(estado) {
    const textos = { connected: "Conectado", disconnected: "Desconectado", connecting: "Conectando..." };
    statusPill.className = "status-pill " + estado;
    statusPill.textContent = textos[estado];
  }

  // ── Stepper de impostores ──────────────────────────────────
  function atualizarStepper() {
    impostorDisplay.textContent = numImpostores;
    impostorDec.disabled = numImpostores <= 1;
  }
  impostorDec.addEventListener("click", () => { if (numImpostores > 1) { numImpostores--; atualizarStepper(); } });
  impostorInc.addEventListener("click", () => { numImpostores++; atualizarStepper(); });
  atualizarStepper();

  // ── Modal do jogo ──────────────────────────────────────────
  function abrirModal() {
    fecharTudo();
    gameModal.classList.add("show");
    overlay.classList.add("show");
  }
  function fecharModal() {
    gameModal.classList.remove("show");
    overlay.classList.remove("show");
  }

  // ── Drawer de usuários ─────────────────────────────────────
  function abrirDrawerUsuarios() {
    fecharTudo();
    usersDrawer.classList.add("open");
    overlay.classList.add("show");
  }
  function fecharTudo() {
    usersDrawer.classList.remove("open");
    gameModal.classList.remove("show");
    overlay.classList.remove("show");
  }

  gameBtn.addEventListener("click",        abrirModal);
  gameModalClose.addEventListener("click", fecharModal);
  usersToggle.addEventListener("click",    abrirDrawerUsuarios);
  usersClose.addEventListener("click",     fecharTudo);
  // Clicar no overlay fecha tudo
  overlay.addEventListener("click",        fecharTudo);
  // Clicar fora do modal (no overlay) também fecha
  gameModal.addEventListener("click", (e) => { if (e.target === gameModal) fecharModal(); });

  // ── Join ───────────────────────────────────────────────────
  function entrar() {
    const nome = nameInput.value.trim();
    if (!nome) { nameInput.focus(); return; }
    myName = nome;
    conectar();
  }
  joinBtn.addEventListener("click", entrar);
  nameInput.addEventListener("keydown", e => { if (e.key === "Enter") entrar(); });

  // ── WebSocket ──────────────────────────────────────────────
  function conectar() {
    joinBtn.disabled = true;
    setStatus("connecting");
    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}`);
    ws.onopen    = () => ws.send(JSON.stringify({ type: "join", name: myName }));
    ws.onmessage = (e) => tratarMensagem(JSON.parse(e.data));
    ws.onclose   = () => { setStatus("disconnected"); joinBtn.disabled = false; };
    ws.onerror   = () => { setStatus("disconnected"); joinBtn.disabled = false; };
  }

  // ── Processar mensagens do servidor ────────────────────────
  function tratarMensagem(dados) {
    if (dados.type === "welcome") {
      isAdmin = dados.isAdmin;
      joinScreen.style.display = "none";
      chatScreen.classList.add("active");
      setStatus("connected");
      document.querySelectorAll(".header-btn").forEach(b => b.style.display = "flex");
      if (!isAdmin) gameBtn.style.display = "none";

    } else if (dados.type === "word_list") {
      renderizarPalavras(dados.words);

    } else if (dados.type === "system") {
      adicionarSistema(dados.text);

    } else if (dados.type === "message") {
      adicionarMensagem(dados);

    } else if (dados.type === "user_list") {
      renderizarUsuarios(dados.users);

    } else if (dados.type === "game_start") {
      fecharModal();
      mostrarRevelacao(dados);

    } else if (dados.type === "game_end") {
      revealScreen.classList.remove("show");
      startGameBtn.style.display = "block";
      endGameBtn.style.display   = "none";

    } else if (dados.type === "game_error") {
      gameError.textContent = dados.text;
      gameError.classList.add("show");
      setTimeout(() => gameError.classList.remove("show"), 3000);

    } else if (dados.type === "promoted") {
      isAdmin = true;
      gameBtn.style.display = "flex";
      renderizarPalavras(dados.words);
    }
  }

  // ── Revelação ──────────────────────────────────────────────
  function mostrarRevelacao(dados) {
    if (dados.isImpostor) {
      revealScreen.className = "show impostor";
      revealCard.className   = "reveal-card impostor";
      revealRole.textContent = "👤 Seu papel";
      revealWord.textContent = "IMPOSTOR";
      revealHint.textContent = "Você não sabe a palavra. Tente convencer os outros de que sabe!";
    } else {
      revealScreen.className = "show";
      revealCard.className   = "reveal-card player";
      revealRole.textContent = "🟡 A palavra é";
      revealWord.textContent = dados.word;
      revealHint.textContent = "Não diga a palavra diretamente — há um impostor entre vocês!";
    }
    revealScreen.classList.add("show");
    if (isAdmin) { startGameBtn.style.display = "none"; endGameBtn.style.display = "block"; }
  }
  revealClose.addEventListener("click", () => revealScreen.classList.remove("show"));

  // ── Gerenciar palavras ─────────────────────────────────────
  function importarLista() {
    const linhas = wordTextarea.value.split("\n").map(l => l.trim()).filter(l => l.length > 0);
    if (!linhas.length) return;
    linhas.forEach(p => ws.send(JSON.stringify({ type: "add_word", word: p.slice(0, 50) })));
    wordTextarea.value = "";
  }
  addWordBtn.addEventListener("click", importarLista);

  resetWordsBtn.addEventListener("click", () => {
    if (confirm("Apagar toda a lista de palavras?")) {
      ws.send(JSON.stringify({ type: "reset_words" }));
    }
  });

  function renderizarPalavras(palavras) {
    if (!palavras.length) {
      wordListAdmin.innerHTML = `<span style="font-size:.78rem;color:var(--muted);font-family:var(--mono)">Nenhuma palavra ainda.</span>`;
      return;
    }
    wordListAdmin.innerHTML = "";
    palavras.forEach(p => {
      const tag    = document.createElement("div"); tag.className = "word-tag";
      const texto  = document.createElement("span"); texto.textContent = p;
      const btn    = document.createElement("button"); btn.className = "word-tag-remove"; btn.textContent = "✕";
      btn.addEventListener("click", () => ws.send(JSON.stringify({ type: "remove_word", word: p })));
      tag.appendChild(texto); tag.appendChild(btn);
      wordListAdmin.appendChild(tag);
    });
  }

  // Inicia o jogo enviando também a quantidade de impostores
  startGameBtn.addEventListener("click", () => {
    ws.send(JSON.stringify({ type: "start_game", numImpostores }));
  });
  endGameBtn.addEventListener("click", () => ws.send(JSON.stringify({ type: "end_game" })));

  // ── Responder mensagem ─────────────────────────────────────
  function definirResposta(from, text) {
    replyTarget = { from, text };
    replyPreviewText.innerHTML = `<strong>${from}:</strong> ${text.slice(0, 60)}${text.length > 60 ? "…" : ""}`;
    replyPreview.classList.add("show");
    msgInput.focus();
  }
  function cancelarResposta() {
    replyTarget = null;
    replyPreview.classList.remove("show");
  }
  replyCancel.addEventListener("click", cancelarResposta);

  // ── Chat ───────────────────────────────────────────────────
  function formatarHora(iso) {
    return new Date(iso).toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
  }

  function adicionarSistema(texto) {
    const el = document.createElement("div");
    el.className = "system-msg";
    el.textContent = texto;
    messagesEl.appendChild(el);
    rolarParaBaixo();
  }

  function adicionarMensagem(dados) {
    const minha = dados.from === myName;
    const bloco = document.createElement("div"); bloco.className = "msg " + (minha ? "mine" : "other");
    const meta  = document.createElement("div"); meta.className = "msg-meta";
    const nome  = document.createElement("span"); nome.className = "msg-name"; nome.style.color = dados.color;
    nome.textContent = minha ? "Você" : dados.from;
    const hora  = document.createElement("span"); hora.textContent = formatarHora(dados.time);
    meta.appendChild(nome); meta.appendChild(hora);

    const bolha = document.createElement("div"); bolha.className = "msg-bubble";

    if (dados.replyTo) {
      const cita = document.createElement("div"); cita.className = "reply-quote";
      cita.textContent = `${dados.replyTo.from}: ${dados.replyTo.text.slice(0, 50)}`;
      bolha.appendChild(cita);
    }

    const textoEl = document.createElement("span"); textoEl.textContent = dados.text;
    bolha.appendChild(textoEl);

    const hint = document.createElement("span"); hint.className = "reply-hint"; hint.textContent = "↩ responder";
    bolha.appendChild(hint);

    bolha.addEventListener("click", () => definirResposta(dados.from, dados.text));

    bloco.appendChild(meta); bloco.appendChild(bolha);
    messagesEl.appendChild(bloco);
    rolarParaBaixo();
  }

  function renderizarUsuarios(usuarios) {
    userListEl.innerHTML = "";
    usersCount.textContent = `${usuarios.length} online`;
    usuarios.forEach(u => {
      const item = document.createElement("div"); item.className = "user-item";
      const dot  = document.createElement("span"); dot.className = "user-dot"; dot.style.background = u.color;
      const nome = document.createElement("span");
      nome.className = "user-name" + (u.name === myName ? " me" : "");
      nome.textContent = u.name === myName ? u.name + " (você)" : u.name;
      item.appendChild(dot); item.appendChild(nome);
      if (u.isAdmin) {
        const badge = document.createElement("span"); badge.className = "admin-badge"; badge.textContent = "admin";
        item.appendChild(badge);
      }
      userListEl.appendChild(item);
    });
  }

  function rolarParaBaixo() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function enviarMensagem() {
    const texto = msgInput.value.trim();
    if (!texto || !ws || ws.readyState !== 1) return;
    ws.send(JSON.stringify({ type: "message", text: texto, replyTo: replyTarget }));
    msgInput.value = "";
    msgInput.style.height = "auto";
    cancelarResposta();
  }

  sendBtn.addEventListener("click", enviarMensagem);
  msgInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); enviarMensagem(); }
    if (e.key === "Escape") cancelarResposta();
  });
  msgInput.addEventListener("input", () => {
    msgInput.style.height = "auto";
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + "px";
  });
</script>
</body>
</html>
