<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ceap Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f5f0e8;
      --surface:      #fffcf5;
      --border:       #e0d8c8;
      --text:         #2a2118;
      --muted:        #9c8f7e;
      --accent:       #c0392b;
      --bubble-me:    #2a2118;
      --bubble-other: #ffffff;
      --radius:       12px;
      --font:         'Outfit', sans-serif;
      --mono:         'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Cabeçalho ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 10px;
    }
    .logo {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -.02em;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .logo-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      animation: pulse 2.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(192,57,43,.4); }
      50%      { box-shadow: 0 0 0 7px rgba(192,57,43,0); }
    }
    .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .status-pill {
      font-family: var(--mono);
      font-size: .65rem;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: .04em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .status-pill.connected    { background: #d1fae5; color: #065f46; }
    .status-pill.disconnected { background: #fee2e2; color: #991b1b; }
    .status-pill.connecting   { background: #fef3c7; color: #92400e; }

    /* Botões do cabeçalho */
    .header-btn {
      display: none;
      align-items: center;
      gap: 6px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 5px 10px 5px 7px;
      cursor: pointer;
      font-family: var(--font);
      font-size: .8rem;
      font-weight: 600;
      color: var(--text);
      transition: all .18s;
      white-space: nowrap;
    }
    .header-btn:hover { background: var(--border); }
    .header-btn .btn-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    #game-btn { border-color: #c0392b44; }
    #game-btn:hover { background: #fdecea; border-color: var(--accent); }

    /* ── Tela de entrada ───────────────────────────────────── */
    #join-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .join-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-shadow: 0 4px 40px rgba(0,0,0,.07);
    }
    .join-card h2 { font-size: 1.8rem; font-weight: 800; line-height: 1.1; letter-spacing: -.04em; }
    .join-card h2 span { color: var(--accent); }
    .join-card p { font-size: .85rem; color: var(--muted); line-height: 1.6; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: .7rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); }
    .field input {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: .95rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color .2s;
    }
    .field input:focus { border-color: var(--accent); }
    .btn-primary {
      padding: 13px 20px;
      border-radius: var(--radius);
      font-family: var(--font);
      font-weight: 700;
      font-size: .95rem;
      cursor: pointer;
      border: none;
      background: var(--accent);
      color: #fff;
      transition: all .18s;
    }
    .btn-primary:hover   { background: #a93226; transform: translateY(-1px); }
    .btn-primary:active  { transform: translateY(0); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ── Layout do chat ────────────────────────────────────── */
    #chat-screen { flex: 1; display: none; overflow: hidden; }
    #chat-screen.active { display: flex; }
    .chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* ── Mensagens ─────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .system-msg {
      text-align: center;
      font-size: .7rem;
      font-family: var(--mono);
      color: var(--muted);
      padding: 4px 0 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .system-msg::before, .system-msg::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .msg { display: flex; flex-direction: column; gap: 3px; max-width: 80%; }
    .msg.mine  { align-self: flex-end;   align-items: flex-end; }
    .msg.other { align-self: flex-start; align-items: flex-start; }
    .msg-meta { display: flex; align-items: baseline; gap: 6px; font-size: .7rem; color: var(--muted); font-family: var(--mono); }
    .msg-name { font-weight: 600; font-size: .76rem; }
    .msg-bubble {
      padding: 9px 13px;
      border-radius: 16px;
      font-size: .88rem;
      line-height: 1.55;
      word-break: break-word;
      position: relative;
      cursor: pointer; /* indica que é clicável para responder */
    }
    .msg-bubble:hover .reply-hint { opacity: 1; }
    .msg.mine  .msg-bubble { background: var(--bubble-me);    color: #fff;        border-radius: 16px 4px 16px 16px; }
    .msg.other .msg-bubble { background: var(--bubble-other); color: var(--text); border-radius: 4px 16px 16px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }

    /* Dica "↩ responder" que aparece ao passar o mouse */
    .reply-hint {
      position: absolute;
      top: -18px;
      font-size: .62rem;
      font-family: var(--mono);
      color: var(--muted);
      opacity: 0;
      transition: opacity .15s;
      white-space: nowrap;
      pointer-events: none;
    }
    .msg.mine  .reply-hint { right: 4px; }
    .msg.other .reply-hint { left: 4px; }

    /* ── Bloco de citação dentro da bolha ──────────────────── */
    /* Aparece quando uma mensagem é uma resposta a outra */
    .reply-quote {
      font-size: .75rem;
      font-family: var(--mono);
      opacity: .7;
      border-left: 2px solid currentColor;
      padding: 3px 8px;
      margin-bottom: 5px;
      border-radius: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 200px;
    }

    /* ── Preview de resposta acima do campo de digitação ───── */
    #reply-preview {
      display: none; /* aparece só quando o usuário clica em responder */
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: .8rem;
      font-family: var(--mono);
      color: var(--muted);
    }
    #reply-preview.show { display: flex; }
    #reply-preview-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #reply-preview-text strong { color: var(--text); }
    #reply-cancel {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      padding: 0 4px;
      transition: color .15s;
      flex-shrink: 0;
    }
    #reply-cancel:hover { color: var(--accent); }

    /* ── Campo de digitação ────────────────────────────────── */
    .input-area {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    #msg-input {
      flex: 1;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: .9rem;
      padding: 10px 13px;
      outline: none;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.5;
      overflow-y: auto;
      transition: border-color .2s;
    }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--muted); }
    #send-btn {
      padding: 10px 16px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: all .18s;
    }
    #send-btn:hover { background: #a93226; }

    /* ── Overlay ───────────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 10;
      animation: fadeIn .2s ease;
    }
    .overlay.show { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ── Drawer base ───────────────────────────────────────── */
    .drawer {
      position: fixed;
      top: 0; bottom: 0;
      background: var(--surface);
      z-index: 11;
      display: flex;
      flex-direction: column;
      padding: 20px 14px;
      gap: 4px;
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      overflow-y: auto;
    }
    .drawer-header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-bottom: 8px; flex-shrink: 0; }
    .drawer-title { font-size: .68rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .drawer-close { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1rem; padding: 2px 6px; border-radius: 4px; transition: all .15s; }
    .drawer-close:hover { background: var(--bg); color: var(--text); }

    /* ── Drawer de usuários (direita) ──────────────────────── */
    #users-drawer {
      right: 0;
      width: 210px;
      border-left: 1px solid var(--border);
      box-shadow: -4px 0 24px rgba(0,0,0,.1);
      transform: translateX(100%);
    }
    #users-drawer.open { transform: translateX(0); }
    .user-item { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 8px; font-size: .83rem; transition: background .15s; }
    .user-item:hover { background: var(--bg); }
    .user-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .user-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-name.me { font-weight: 700; }
    .admin-badge { font-size: .58rem; font-weight: 700; background: #fdecea; color: var(--accent); border-radius: 4px; padding: 1px 5px; text-transform: uppercase; letter-spacing: .04em; flex-shrink: 0; }

    /* ── Drawer do jogo (esquerda) ─────────────────────────── */
    #game-drawer {
      left: 0;
      width: 280px;
      border-right: 1px solid var(--border);
      box-shadow: 4px 0 24px rgba(0,0,0,.1);
      transform: translateX(-100%);
      gap: 14px;
    }
    #game-drawer.open { transform: translateX(0); }

    .game-drawer-title { font-size: 1rem; font-weight: 800; letter-spacing: -.02em; }
    .game-drawer-title span { color: var(--accent); }
    .section-label { font-size: .65rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); flex-shrink: 0; }

    /* Textarea para colar lista de palavras */
    #word-textarea {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: .82rem;
      padding: 10px 12px;
      outline: none;
      resize: none;
      height: 110px;
      line-height: 1.7;
      width: 100%;
      transition: border-color .2s;
      flex-shrink: 0;
    }
    #word-textarea:focus { border-color: var(--accent); }
    #word-textarea::placeholder { color: var(--muted); }

    /* Botões lado a lado: importar e resetar */
    .word-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .word-actions button {
      flex: 1;
      padding: 9px 8px;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: .82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s;
    }
    #add-word-btn  { background: var(--accent); color: #fff; }
    #add-word-btn:hover  { background: #a93226; }
    /* Botão de reset: discreto, mas visível */
    #reset-words-btn { background: var(--bg); color: var(--muted); border: 1.5px solid var(--border) !important; }
    #reset-words-btn:hover { border-color: var(--accent) !important; color: var(--accent); }

    /* Lista de palavras */
    #word-list-admin { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
    .word-tag { display: flex; align-items: center; justify-content: space-between; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: .83rem; }
    .word-tag-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: .9rem; padding: 0 2px; border-radius: 4px; transition: color .15s; }
    .word-tag-remove:hover { color: var(--accent); }

    .divider { height: 1px; background: var(--border); flex-shrink: 0; }

    /* Botão iniciar jogo */
    #start-game-btn {
      padding: 13px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-family: var(--font);
      font-size: .92rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s;
      text-align: center;
      flex-shrink: 0;
    }
    #start-game-btn:hover { background: #a93226; transform: translateY(-1px); }

    /* Botão encerrar jogo */
    #end-game-btn {
      display: none;
      padding: 10px;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-family: var(--font);
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s;
      text-align: center;
      flex-shrink: 0;
    }
    #end-game-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Erro do jogo */
    #game-error {
      font-size: .78rem;
      color: var(--accent);
      font-family: var(--mono);
      display: none;
      padding: 8px 10px;
      background: #fdecea;
      border-radius: 8px;
      flex-shrink: 0;
    }
    #game-error.show { display: block; }

    /* ── Tela de revelação ─────────────────────────────────── */
    #reveal-screen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 20;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #0d0d0d;
      animation: fadeIn .3s ease;
    }
    #reveal-screen.show { display: flex; }
    #reveal-screen.impostor { background: #1a0000; }
    .reveal-card { display: flex; flex-direction: column; align-items: center; gap: 18px; text-align: center; max-width: 380px; width: 100%; }
    .reveal-role { font-size: .72rem; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; opacity: .6; }
    .reveal-word { font-size: 2.8rem; font-weight: 800; letter-spacing: -.04em; line-height: 1; }
    .reveal-hint { font-size: .88rem; opacity: .6; line-height: 1.5; max-width: 280px; }
    .reveal-card.player { color: #fff; }
    .reveal-card.player .reveal-word { color: #fbbf24; }
    .reveal-card.impostor { color: #fff; }
    .reveal-card.impostor .reveal-word { color: #f87171; }
    .reveal-close {
      margin-top: 6px;
      padding: 11px 28px;
      background: rgba(255,255,255,.15);
      border: 1.5px solid rgba(255,255,255,.25);
      border-radius: 20px;
      color: #fff;
      font-family: var(--font);
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .18s;
    }
    .reveal-close:hover { background: rgba(255,255,255,.25); }

    /* ── Responsividade mobile ─────────────────────────────── */
    @media (max-width: 480px) {
      /* Cabeçalho menor */
      header { padding: 10px 14px; }
      .logo { font-size: 1rem; }

      /* Status some no mobile para economizar espaço */
      #status-pill { display: none; }

      /* Mensagens ocupam mais largura */
      .msg { max-width: 90%; }

      /* Campos e padding reduzidos */
      #messages { padding: 14px 14px; }
      .input-area { padding: 10px 12px; gap: 7px; }
      #msg-input { font-size: .85rem; padding: 9px 11px; }
      #send-btn { padding: 9px 13px; font-size: .9rem; }

      /* Drawers ocupam mais da tela no mobile */
      #users-drawer { width: 80vw; }
      #game-drawer  { width: 88vw; }

      /* Join card sem padding excessivo */
      .join-card { padding: 28px 22px; gap: 16px; }
      .join-card h2 { font-size: 1.5rem; }

      /* Revelação com palavra menor */
      .reveal-word { font-size: 2.2rem; }

      /* Preview de resposta mais compacto */
      #reply-preview { padding: 7px 12px; font-size: .75rem; }
    }
  </style>
</head>
<body>

<!-- ── Cabeçalho ───────────────────────────────────────────── -->
<header>
  <div class="logo">
    <span class="logo-dot"></span>
    Ceap Chat
  </div>
  <div class="header-right">
    <span id="status-pill" class="status-pill disconnected">Desconectado</span>

    <!-- Botão do painel do Impostor (só para o admin) -->
    <button class="header-btn" id="game-btn">
      <span class="btn-dot" style="background:var(--accent)"></span>
      <span>Impostor</span>
    </button>

    <!-- Botão de usuários online -->
    <button class="header-btn" id="users-toggle">
      <span class="btn-dot" style="background:#22c55e"></span>
      <span id="users-count">0 online</span>
    </button>
  </div>
</header>

<!-- ── Overlay ──────────────────────────────────────────────── -->
<div class="overlay" id="overlay"></div>

<!-- ── Drawer de usuários (direita) ────────────────────────── -->
<div class="drawer" id="users-drawer">
  <div class="drawer-header">
    <span class="drawer-title">Online agora</span>
    <button class="drawer-close" id="users-close">✕</button>
  </div>
  <div id="user-list"></div>
</div>

<!-- ── Drawer do jogo Impostor (esquerda) ───────────────────── -->
<div class="drawer" id="game-drawer">
  <div class="drawer-header">
    <span class="game-drawer-title">🕵️ Jogo do <span>Impostor</span></span>
    <button class="drawer-close" id="game-close">✕</button>
  </div>

  <span class="section-label">Palavras (cole uma por linha)</span>
  <textarea id="word-textarea" placeholder="Futebol&#10;Música&#10;Viagem&#10;..."></textarea>

  <!-- Botões importar e resetar lado a lado -->
  <div class="word-actions">
    <button id="add-word-btn">⬆ Importar</button>
    <button id="reset-words-btn">🗑 Resetar lista</button>
  </div>

  <span class="section-label">Palavras na lista</span>
  <div id="word-list-admin">
    <span style="font-size:.78rem;color:var(--muted);font-family:var(--mono)">Nenhuma palavra ainda.</span>
  </div>

  <div class="divider"></div>
  <div id="game-error"></div>
  <button id="start-game-btn">🎮 Iniciar Impostor</button>
  <button id="end-game-btn">Encerrar jogo</button>
</div>

<!-- ── Tela de entrada ──────────────────────────────────────── -->
<div id="join-screen">
  <div class="join-card">
    <h2>Bem-vindo ao<br/><span>Ceap Chat</span></h2>
    <p>Chat em tempo real entre alunos. Escolha um nome para entrar.</p>
    <div class="field">
      <label>Seu nome</label>
      <input id="name-input" type="text" placeholder="Ex: João" maxlength="20" autocomplete="off" />
    </div>
    <button class="btn-primary" id="join-btn">Entrar no chat →</button>
  </div>
</div>

<!-- ── Tela de chat ─────────────────────────────────────────── -->
<div id="chat-screen">
  <div class="chat-main">
    <div id="messages"></div>

    <!-- Preview da mensagem sendo respondida (aparece ao clicar em responder) -->
    <div id="reply-preview">
      <span>↩</span>
      <span id="reply-preview-text"></span>
      <button id="reply-cancel">✕</button>
    </div>

    <div class="input-area">
      <textarea id="msg-input" placeholder="Digite uma mensagem..." rows="1"></textarea>
      <button id="send-btn">➤</button>
    </div>
  </div>
</div>

<!-- ── Tela de revelação ────────────────────────────────────── -->
<div id="reveal-screen">
  <div class="reveal-card" id="reveal-card">
    <span class="reveal-role" id="reveal-role"></span>
    <span class="reveal-word" id="reveal-word"></span>
    <span class="reveal-hint" id="reveal-hint"></span>
    <button class="reveal-close" id="reveal-close">Entendi →</button>
  </div>
</div>

<script>
  // ── Referências ────────────────────────────────────────────
  const joinScreen      = document.getElementById("join-screen");
  const chatScreen      = document.getElementById("chat-screen");
  const nameInput       = document.getElementById("name-input");
  const joinBtn         = document.getElementById("join-btn");
  const statusPill      = document.getElementById("status-pill");
  const messagesEl      = document.getElementById("messages");
  const msgInput        = document.getElementById("msg-input");
  const sendBtn         = document.getElementById("send-btn");
  const userListEl      = document.getElementById("user-list");
  const usersCount      = document.getElementById("users-count");
  const overlay         = document.getElementById("overlay");
  const usersDrawer     = document.getElementById("users-drawer");
  const usersToggle     = document.getElementById("users-toggle");
  const usersClose      = document.getElementById("users-close");
  const gameDrawer      = document.getElementById("game-drawer");
  const gameBtn         = document.getElementById("game-btn");
  const gameClose       = document.getElementById("game-close");
  const wordTextarea    = document.getElementById("word-textarea");
  const addWordBtn      = document.getElementById("add-word-btn");
  const resetWordsBtn   = document.getElementById("reset-words-btn");
  const wordListAdmin   = document.getElementById("word-list-admin");
  const startGameBtn    = document.getElementById("start-game-btn");
  const endGameBtn      = document.getElementById("end-game-btn");
  const gameError       = document.getElementById("game-error");
  const revealScreen    = document.getElementById("reveal-screen");
  const revealCard      = document.getElementById("reveal-card");
  const revealRole      = document.getElementById("reveal-role");
  const revealWord      = document.getElementById("reveal-word");
  const revealHint      = document.getElementById("reveal-hint");
  const revealClose     = document.getElementById("reveal-close");
  const replyPreview    = document.getElementById("reply-preview");
  const replyPreviewText = document.getElementById("reply-preview-text");
  const replyCancel     = document.getElementById("reply-cancel");

  // ── Estado local ───────────────────────────────────────────
  let ws          = null;
  let myName      = "";
  let isAdmin     = false;
  let replyTarget = null; // { from, text } da mensagem sendo respondida

  // ── Status ─────────────────────────────────────────────────
  function setStatus(estado) {
    const textos = { connected: "Conectado", disconnected: "Desconectado", connecting: "Conectando..." };
    statusPill.className = "status-pill " + estado;
    statusPill.textContent = textos[estado];
  }

  // ── Drawers ─────────────────────────────────────────────────
  function abrirDrawer(drawer) {
    fecharTodosDrawers();
    drawer.classList.add("open");
    overlay.classList.add("show");
  }
  function fecharTodosDrawers() {
    usersDrawer.classList.remove("open");
    gameDrawer.classList.remove("open");
    overlay.classList.remove("show");
  }
  usersToggle.addEventListener("click", () => abrirDrawer(usersDrawer));
  usersClose.addEventListener("click",  fecharTodosDrawers);
  gameBtn.addEventListener("click",     () => abrirDrawer(gameDrawer));
  gameClose.addEventListener("click",   fecharTodosDrawers);
  overlay.addEventListener("click",     fecharTodosDrawers);

  // ── Join ───────────────────────────────────────────────────
  function entrar() {
    const nome = nameInput.value.trim();
    if (!nome) { nameInput.focus(); return; }
    myName = nome;
    conectar();
  }
  joinBtn.addEventListener("click", entrar);
  nameInput.addEventListener("keydown", e => { if (e.key === "Enter") entrar(); });

  // ── WebSocket ──────────────────────────────────────────────
  // Usa location.host para funcionar tanto local quanto no Render
  function conectar() {
    joinBtn.disabled = true;
    setStatus("connecting");
    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}`);
    ws.onopen    = () => ws.send(JSON.stringify({ type: "join", name: myName }));
    ws.onmessage = (e) => tratarMensagem(JSON.parse(e.data));
    ws.onclose   = () => { setStatus("disconnected"); joinBtn.disabled = false; };
    ws.onerror   = () => { setStatus("disconnected"); joinBtn.disabled = false; };
  }

  // ── Processar mensagens do servidor ────────────────────────
  function tratarMensagem(dados) {
    if (dados.type === "welcome") {
      isAdmin = dados.isAdmin;
      joinScreen.style.display = "none";
      chatScreen.classList.add("active");
      setStatus("connected");
      document.querySelectorAll(".header-btn").forEach(b => b.style.display = "flex");
      if (!isAdmin) gameBtn.style.display = "none";

    } else if (dados.type === "word_list") {
      renderizarPalavras(dados.words);

    } else if (dados.type === "system") {
      adicionarSistema(dados.text);

    } else if (dados.type === "message") {
      adicionarMensagem(dados);

    } else if (dados.type === "user_list") {
      renderizarUsuarios(dados.users);

    } else if (dados.type === "game_start") {
      mostrarRevelacao(dados);

    } else if (dados.type === "game_end") {
      revealScreen.classList.remove("show");
      startGameBtn.style.display = "block";
      endGameBtn.style.display   = "none";

    } else if (dados.type === "game_error") {
      gameError.textContent = dados.text;
      gameError.classList.add("show");
      setTimeout(() => gameError.classList.remove("show"), 3000);

    } else if (dados.type === "promoted") {
      isAdmin = true;
      gameBtn.style.display = "flex";
      renderizarPalavras(dados.words);
    }
  }

  // ── Revelação ──────────────────────────────────────────────
  function mostrarRevelacao(dados) {
    fecharTodosDrawers();
    if (dados.isImpostor) {
      revealScreen.className     = "show impostor";
      revealCard.className       = "reveal-card impostor";
      revealRole.textContent     = "👤 Seu papel";
      revealWord.textContent     = "IMPOSTOR";
      revealHint.textContent     = "Você não sabe a palavra. Tente convencer os outros de que sabe!";
    } else {
      revealScreen.className     = "show";
      revealCard.className       = "reveal-card player";
      revealRole.textContent     = "🟡 A palavra é";
      revealWord.textContent     = dados.word;
      revealHint.textContent     = "Não diga a palavra diretamente — um impostor está entre vocês!";
    }
    revealScreen.classList.add("show");
    if (isAdmin) { startGameBtn.style.display = "none"; endGameBtn.style.display = "block"; }
  }
  revealClose.addEventListener("click", () => revealScreen.classList.remove("show"));

  // ── Gerenciar palavras ─────────────────────────────────────

  // Importa todas as linhas do textarea de uma vez
  function importarLista() {
    const linhas = wordTextarea.value
      .split("\n")
      .map(l => l.trim())
      .filter(l => l.length > 0);
    if (!linhas.length) return;
    linhas.forEach(p => ws.send(JSON.stringify({ type: "add_word", word: p.slice(0, 50) })));
    wordTextarea.value = "";
  }
  addWordBtn.addEventListener("click", importarLista);

  // Reseta toda a lista após confirmação
  resetWordsBtn.addEventListener("click", () => {
    if (confirm("Tem certeza que quer apagar toda a lista de palavras?")) {
      ws.send(JSON.stringify({ type: "reset_words" }));
    }
  });

  // Renderiza a lista de palavras no painel
  function renderizarPalavras(palavras) {
    if (!palavras.length) {
      wordListAdmin.innerHTML = `<span style="font-size:.78rem;color:var(--muted);font-family:var(--mono)">Nenhuma palavra ainda.</span>`;
      return;
    }
    wordListAdmin.innerHTML = "";
    palavras.forEach(p => {
      const tag    = document.createElement("div"); tag.className = "word-tag";
      const texto  = document.createElement("span"); texto.textContent = p;
      const remover = document.createElement("button"); remover.className = "word-tag-remove"; remover.textContent = "✕";
      remover.addEventListener("click", () => ws.send(JSON.stringify({ type: "remove_word", word: p })));
      tag.appendChild(texto); tag.appendChild(remover);
      wordListAdmin.appendChild(tag);
    });
  }

  startGameBtn.addEventListener("click", () => ws.send(JSON.stringify({ type: "start_game" })));
  endGameBtn.addEventListener("click",   () => ws.send(JSON.stringify({ type: "end_game" })));

  // ── Responder mensagem ─────────────────────────────────────

  // Define a mensagem que está sendo respondida e mostra o preview
  function definirResposta(from, text) {
    replyTarget = { from, text };
    replyPreviewText.innerHTML = `<strong>${from}:</strong> ${text.slice(0, 60)}${text.length > 60 ? "…" : ""}`;
    replyPreview.classList.add("show");
    msgInput.focus();
  }

  // Cancela a resposta
  function cancelarResposta() {
    replyTarget = null;
    replyPreview.classList.remove("show");
  }
  replyCancel.addEventListener("click", cancelarResposta);

  // ── Chat ───────────────────────────────────────────────────
  function formatarHora(iso) {
    return new Date(iso).toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
  }

  function adicionarSistema(texto) {
    const el = document.createElement("div");
    el.className = "system-msg";
    el.textContent = texto;
    messagesEl.appendChild(el);
    rolarParaBaixo();
  }

  function adicionarMensagem(dados) {
    const minha = dados.from === myName;
    const bloco = document.createElement("div");
    bloco.className = "msg " + (minha ? "mine" : "other");

    // Linha de meta (nome + hora)
    const meta = document.createElement("div"); meta.className = "msg-meta";
    const nome = document.createElement("span"); nome.className = "msg-name";
    nome.style.color = dados.color;
    nome.textContent = minha ? "Você" : dados.from;
    const hora = document.createElement("span"); hora.textContent = formatarHora(dados.time);
    meta.appendChild(nome); meta.appendChild(hora);

    // Bolha
    const bolha = document.createElement("div"); bolha.className = "msg-bubble";

    // Se for uma resposta, mostra a citação dentro da bolha
    if (dados.replyTo) {
      const cita = document.createElement("div");
      cita.className = "reply-quote";
      cita.textContent = `${dados.replyTo.from}: ${dados.replyTo.text.slice(0, 50)}`;
      bolha.appendChild(cita);
    }

    const textoEl = document.createElement("span");
    textoEl.textContent = dados.text;
    bolha.appendChild(textoEl);

    // Dica de resposta que aparece ao hover
    const hint = document.createElement("span");
    hint.className = "reply-hint";
    hint.textContent = "↩ responder";
    bolha.appendChild(hint);

    // Clicar na bolha define essa mensagem como alvo de resposta
    bolha.addEventListener("click", () => definirResposta(dados.from, dados.text));

    bloco.appendChild(meta); bloco.appendChild(bolha);
    messagesEl.appendChild(bloco);
    rolarParaBaixo();
  }

  function renderizarUsuarios(usuarios) {
    userListEl.innerHTML = "";
    usersCount.textContent = `${usuarios.length} online`;
    usuarios.forEach(u => {
      const item = document.createElement("div"); item.className = "user-item";
      const dot  = document.createElement("span"); dot.className = "user-dot"; dot.style.background = u.color;
      const nome = document.createElement("span");
      nome.className = "user-name" + (u.name === myName ? " me" : "");
      nome.textContent = u.name === myName ? u.name + " (você)" : u.name;
      item.appendChild(dot); item.appendChild(nome);
      if (u.isAdmin) {
        const badge = document.createElement("span"); badge.className = "admin-badge"; badge.textContent = "admin";
        item.appendChild(badge);
      }
      userListEl.appendChild(item);
    });
  }

  function rolarParaBaixo() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function enviarMensagem() {
    const texto = msgInput.value.trim();
    if (!texto || !ws || ws.readyState !== 1) return;

    // Inclui os dados de resposta na mensagem, se houver
    ws.send(JSON.stringify({
      type: "message",
      text: texto,
      replyTo: replyTarget // null se não for resposta
    }));

    msgInput.value = "";
    msgInput.style.height = "auto";
    cancelarResposta(); // limpa o preview após enviar
  }

  sendBtn.addEventListener("click", enviarMensagem);
  msgInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); enviarMensagem(); }
    // Esc cancela a resposta
    if (e.key === "Escape") cancelarResposta();
  });
  msgInput.addEventListener("input", () => {
    msgInput.style.height = "auto";
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + "px";
  });
</script>
</body>
</html>
