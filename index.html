<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ceap Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f5f0e8;
      --surface:      #fffcf5;
      --border:       #e0d8c8;
      --text:         #2a2118;
      --muted:        #9c8f7e;
      --accent:       #c0392b;
      --bubble-me:    #2a2118;
      --bubble-other: #ffffff;
      --radius:       12px;
      --font:         'Outfit', sans-serif;
      --mono:         'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Cabeçalho ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }
    .logo {
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -.02em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(192,57,43,.4); }
      50%      { box-shadow: 0 0 0 7px rgba(192,57,43,0); }
    }
    .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }

    .status-pill {
      font-family: var(--mono);
      font-size: .68rem;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .status-pill.connected    { background: #d1fae5; color: #065f46; }
    .status-pill.disconnected { background: #fee2e2; color: #991b1b; }
    .status-pill.connecting   { background: #fef3c7; color: #92400e; }

    /* Botões do cabeçalho (usuários online e painel admin) */
    .header-btn {
      display: none; /* aparecem após o join */
      align-items: center;
      gap: 7px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px 5px 8px;
      cursor: pointer;
      font-family: var(--font);
      font-size: .82rem;
      font-weight: 600;
      color: var(--text);
      transition: all .18s;
    }
    .header-btn:hover { background: var(--border); }
    .header-btn .btn-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* Botão do admin tem cor especial */
    #game-btn { border-color: #c0392b44; }
    #game-btn:hover { background: #fdecea; border-color: var(--accent); }
    #game-btn .btn-dot { background: var(--accent); }

    /* ── Tela de entrada ───────────────────────────────────── */
    #join-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .join-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      box-shadow: 0 4px 40px rgba(0,0,0,.07);
    }
    .join-card h2 { font-size: 2rem; font-weight: 800; line-height: 1.1; letter-spacing: -.04em; }
    .join-card h2 span { color: var(--accent); }
    .join-card p { font-size: .85rem; color: var(--muted); line-height: 1.6; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: .72rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); }
    .field input {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: .95rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color .2s;
    }
    .field input:focus { border-color: var(--accent); }
    .btn-primary {
      padding: 13px 20px;
      border-radius: var(--radius);
      font-family: var(--font);
      font-weight: 700;
      font-size: .95rem;
      cursor: pointer;
      border: none;
      background: var(--accent);
      color: #fff;
      transition: all .18s;
    }
    .btn-primary:hover   { background: #a93226; transform: translateY(-1px); }
    .btn-primary:active  { transform: translateY(0); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ── Layout do chat ────────────────────────────────────── */
    #chat-screen { flex: 1; display: none; overflow: hidden; }
    #chat-screen.active { display: flex; }
    .chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* ── Mensagens ─────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .system-msg {
      text-align: center;
      font-size: .72rem;
      font-family: var(--mono);
      color: var(--muted);
      padding: 4px 0 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .system-msg::before, .system-msg::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .msg { display: flex; flex-direction: column; gap: 3px; max-width: 68%; }
    .msg.mine  { align-self: flex-end;  align-items: flex-end; }
    .msg.other { align-self: flex-start; align-items: flex-start; }
    .msg-meta { display: flex; align-items: baseline; gap: 6px; font-size: .72rem; color: var(--muted); font-family: var(--mono); }
    .msg-name { font-weight: 600; font-size: .78rem; }
    .msg-bubble { padding: 9px 14px; border-radius: 16px; font-size: .9rem; line-height: 1.55; word-break: break-word; }
    .msg.mine  .msg-bubble { background: var(--bubble-me);    color: #fff;        border-radius: 16px 4px 16px 16px; }
    .msg.other .msg-bubble { background: var(--bubble-other); color: var(--text); border-radius: 4px 16px 16px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }

    /* ── Campo de digitação ────────────────────────────────── */
    .input-area {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 14px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    #msg-input {
      flex: 1;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: .9rem;
      padding: 10px 14px;
      outline: none;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.5;
      overflow-y: auto;
      transition: border-color .2s;
    }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--muted); }
    #send-btn {
      padding: 10px 18px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: all .18s;
    }
    #send-btn:hover { background: #a93226; }

    /* ── Overlay genérico (fundo escuro) ───────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 10;
      animation: fadeIn .2s ease;
    }
    .overlay.show { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ── Drawer de usuários ────────────────────────────────── */
    #users-drawer {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 220px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      box-shadow: -4px 0 24px rgba(0,0,0,.1);
      z-index: 11;
      display: flex;
      flex-direction: column;
      padding: 20px 14px;
      gap: 4px;
      transform: translateX(100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
    }
    #users-drawer.open { transform: translateX(0); }
    .drawer-header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
    .drawer-title { font-size: .68rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .drawer-close { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1rem; padding: 2px 4px; border-radius: 4px; transition: all .15s; }
    .drawer-close:hover { background: var(--bg); color: var(--text); }
    .user-item { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 8px; font-size: .83rem; transition: background .15s; }
    .user-item:hover { background: var(--bg); }
    .user-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .user-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-name.me { font-weight: 700; }
    /* Badge de admin ao lado do nome */
    .admin-badge { font-size: .6rem; font-weight: 700; background: #fdecea; color: var(--accent); border-radius: 4px; padding: 1px 5px; text-transform: uppercase; letter-spacing: .05em; }

    /* ── Painel do admin (drawer esquerdo) ─────────────────── */
    #game-drawer {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      box-shadow: 4px 0 24px rgba(0,0,0,.1);
      z-index: 11;
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 16px;
      transform: translateX(-100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      overflow-y: auto;
    }
    #game-drawer.open { transform: translateX(0); }

    .game-drawer-header { display: flex; align-items: center; justify-content: space-between; }
    .game-drawer-title { font-size: 1rem; font-weight: 800; letter-spacing: -.02em; }
    .game-drawer-title span { color: var(--accent); }

    /* Campo de adicionar palavra */
    .word-input-row { display: flex; gap: 8px; }
    .word-input-row input {
      flex: 1;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: .88rem;
      padding: 9px 12px;
      outline: none;
      transition: border-color .2s;
    }
    .word-input-row input:focus { border-color: var(--accent); }
    .word-input-row button {
      padding: 9px 14px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-size: .88rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .18s;
      white-space: nowrap;
    }
    .word-input-row button:hover { background: #a93226; }

    /* Lista de palavras cadastradas */
    .section-label { font-size: .68rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    #word-list-admin { display: flex; flex-direction: column; gap: 6px; }
    .word-tag {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: .85rem;
    }
    .word-tag-remove {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: .9rem;
      padding: 0 2px;
      border-radius: 4px;
      transition: color .15s;
    }
    .word-tag-remove:hover { color: var(--accent); }

    /* Separador */
    .divider { height: 1px; background: var(--border); }

    /* Botão de iniciar jogo */
    #start-game-btn {
      padding: 13px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-family: var(--font);
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s;
      text-align: center;
    }
    #start-game-btn:hover { background: #a93226; transform: translateY(-1px); }

    /* Botão de encerrar jogo (aparece quando o jogo está ativo) */
    #end-game-btn {
      display: none;
      padding: 10px;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-family: var(--font);
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s;
      text-align: center;
    }
    #end-game-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Mensagem de erro do jogo */
    #game-error {
      font-size: .8rem;
      color: var(--accent);
      font-family: var(--mono);
      display: none;
      padding: 8px 10px;
      background: #fdecea;
      border-radius: 8px;
    }
    #game-error.show { display: block; }

    /* ── Tela de revelação do jogo ─────────────────────────── */
    /* Aparece para todos quando o jogo começa, mostrando a palavra ou "impostor" */
    #reveal-screen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 20;
      align-items: center;
      justify-content: center;
      padding: 24px;
      /* Fundo muda conforme o papel */
      background: #0d0d0d;
      animation: fadeIn .3s ease;
    }
    #reveal-screen.show { display: flex; }

    .reveal-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .reveal-role {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      opacity: .6;
    }
    .reveal-word {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -.04em;
      line-height: 1;
    }
    .reveal-hint {
      font-size: .9rem;
      opacity: .6;
      line-height: 1.5;
      max-width: 280px;
    }
    /* Variante para jogador normal: fundo escuro, texto claro */
    .reveal-card.player { color: #fff; }
    .reveal-card.player .reveal-word { color: #fbbf24; } /* amarelo para destaque */

    /* Variante para impostor: fundo vermelho escuro */
    #reveal-screen.impostor { background: #1a0000; }
    .reveal-card.impostor { color: #fff; }
    .reveal-card.impostor .reveal-word { color: #f87171; }

    /* Variante para admin (vê tudo) */
    #reveal-screen.admin-view { background: #001a0a; }
    .reveal-card.admin-view { color: #fff; }
    .reveal-card.admin-view .reveal-word { color: #6ee7b7; }

    .reveal-close {
      margin-top: 8px;
      padding: 11px 28px;
      background: rgba(255,255,255,.15);
      border: 1.5px solid rgba(255,255,255,.25);
      border-radius: 20px;
      color: #fff;
      font-family: var(--font);
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .18s;
    }
    .reveal-close:hover { background: rgba(255,255,255,.25); }
  </style>
</head>
<body>

<!-- ── Cabeçalho ───────────────────────────────────────────── -->
<header>
  <div class="logo">
    <span class="logo-dot"></span>
    Ceap Chat
  </div>
  <div class="header-right">
    <span id="status-pill" class="status-pill disconnected">Desconectado</span>

    <!-- Botão do painel de jogo (só para o admin) -->
    <button class="header-btn" id="game-btn">
      <span class="btn-dot" style="background:var(--accent)"></span>
      <span>Jogo</span>
    </button>

    <!-- Botão de usuários online -->
    <button class="header-btn" id="users-toggle">
      <span class="btn-dot" style="background:#22c55e"></span>
      <span id="users-count">0 online</span>
    </button>
  </div>
</header>

<!-- ── Overlay (fundo escuro dos drawers) ──────────────────── -->
<div class="overlay" id="overlay"></div>

<!-- ── Drawer de usuários (direita) ────────────────────────── -->
<div id="users-drawer">
  <div class="drawer-header">
    <span class="drawer-title">Online agora</span>
    <button class="drawer-close" id="users-close">✕</button>
  </div>
  <div id="user-list"></div>
</div>

<!-- ── Drawer do admin / painel de jogo (esquerda) ─────────── -->
<div id="game-drawer">
  <div class="game-drawer-header">
    <span class="game-drawer-title">Painel do <span>Jogo</span></span>
    <button class="drawer-close" id="game-close">✕</button>
  </div>

  <!-- Campo para adicionar palavras -->
  <span class="section-label">Adicionar palavra</span>
  <div class="word-input-row">
    <input id="word-input" type="text" placeholder="Ex: Futebol" maxlength="50" autocomplete="off" />
    <button id="add-word-btn">+ Add</button>
  </div>

  <!-- Lista de palavras cadastradas -->
  <span class="section-label">Palavras na lista</span>
  <div id="word-list-admin">
    <span style="font-size:.8rem;color:var(--muted);font-family:var(--mono)">Nenhuma palavra ainda.</span>
  </div>

  <div class="divider"></div>

  <!-- Erros do jogo -->
  <div id="game-error"></div>

  <!-- Botão de iniciar -->
  <button id="start-game-btn">🎮 Iniciar jogo</button>

  <!-- Botão de encerrar (aparece durante o jogo) -->
  <button id="end-game-btn">Encerrar jogo</button>
</div>

<!-- ── Tela de entrada ──────────────────────────────────────── -->
<div id="join-screen">
  <div class="join-card">
    <h2>Bem-vindo ao<br/><span>Ceap Chat</span></h2>
    <p>Chat em tempo real entre alunos. Escolha um nome para entrar.</p>
    <div class="field">
      <label>Seu nome</label>
      <input id="name-input" type="text" placeholder="Ex: João" maxlength="20" autocomplete="off" />
    </div>
    <button class="btn-primary" id="join-btn">Entrar no chat →</button>
  </div>
</div>

<!-- ── Tela de chat ─────────────────────────────────────────── -->
<div id="chat-screen">
  <div class="chat-main">
    <div id="messages"></div>
    <div class="input-area">
      <textarea id="msg-input" placeholder="Digite uma mensagem..." rows="1"></textarea>
      <button id="send-btn">➤</button>
    </div>
  </div>
</div>

<!-- ── Tela de revelação do jogo ────────────────────────────── -->
<!-- Aparece em tela cheia quando o admin inicia o jogo -->
<div id="reveal-screen">
  <div class="reveal-card" id="reveal-card">
    <span class="reveal-role" id="reveal-role"></span>
    <span class="reveal-word" id="reveal-word"></span>
    <span class="reveal-hint" id="reveal-hint"></span>
    <button class="reveal-close" id="reveal-close">Entendi →</button>
  </div>
</div>

<script>
  // ── Referências ────────────────────────────────────────────
  const joinScreen    = document.getElementById("join-screen");
  const chatScreen    = document.getElementById("chat-screen");
  const nameInput     = document.getElementById("name-input");
  const joinBtn       = document.getElementById("join-btn");
  const statusPill    = document.getElementById("status-pill");
  const messagesEl    = document.getElementById("messages");
  const msgInput      = document.getElementById("msg-input");
  const sendBtn       = document.getElementById("send-btn");
  const userListEl    = document.getElementById("user-list");
  const usersCount    = document.getElementById("users-count");
  const overlay       = document.getElementById("overlay");
  const usersDrawer   = document.getElementById("users-drawer");
  const usersToggle   = document.getElementById("users-toggle");
  const usersClose    = document.getElementById("users-close");
  const gameDrawer    = document.getElementById("game-drawer");
  const gameBtn       = document.getElementById("game-btn");
  const gameClose     = document.getElementById("game-close");
  const wordInput     = document.getElementById("word-input");
  const addWordBtn    = document.getElementById("add-word-btn");
  const wordListAdmin = document.getElementById("word-list-admin");
  const startGameBtn  = document.getElementById("start-game-btn");
  const endGameBtn    = document.getElementById("end-game-btn");
  const gameError     = document.getElementById("game-error");
  const revealScreen  = document.getElementById("reveal-screen");
  const revealCard    = document.getElementById("reveal-card");
  const revealRole    = document.getElementById("reveal-role");
  const revealWord    = document.getElementById("reveal-word");
  const revealHint    = document.getElementById("reveal-hint");
  const revealClose   = document.getElementById("reveal-close");

  // ── Estado local ───────────────────────────────────────────
  let ws      = null;
  let myName  = "";
  let isAdmin = false;

  // ── Status ─────────────────────────────────────────────────
  function setStatus(estado) {
    const textos = { connected: "Conectado", disconnected: "Desconectado", connecting: "Conectando..." };
    statusPill.className = "status-pill " + estado;
    statusPill.textContent = textos[estado];
  }

  // ── Drawers ─────────────────────────────────────────────────
  // Controla qual drawer está aberto (só um por vez)
  function abrirDrawer(drawer) {
    fecharTodosDrawers();
    drawer.classList.add("open");
    overlay.classList.add("show");
  }
  function fecharTodosDrawers() {
    usersDrawer.classList.remove("open");
    gameDrawer.classList.remove("open");
    overlay.classList.remove("show");
  }

  usersToggle.addEventListener("click", () => abrirDrawer(usersDrawer));
  usersClose.addEventListener("click",  fecharTodosDrawers);
  gameBtn.addEventListener("click",     () => abrirDrawer(gameDrawer));
  gameClose.addEventListener("click",   fecharTodosDrawers);
  overlay.addEventListener("click",     fecharTodosDrawers);

  // ── Join ───────────────────────────────────────────────────
  function entrar() {
    const nome = nameInput.value.trim();
    if (!nome) { nameInput.focus(); return; }
    myName = nome;
    conectar();
  }
  joinBtn.addEventListener("click", entrar);
  nameInput.addEventListener("keydown", e => { if (e.key === "Enter") entrar(); });

  // ── WebSocket ──────────────────────────────────────────────
  function conectar() {
    joinBtn.disabled = true;
    setStatus("connecting");
    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}`);

    ws.onopen = () => {
      ws.send(JSON.stringify({ type: "join", name: myName }));
    };
    ws.onmessage = (e) => tratarMensagem(JSON.parse(e.data));
    ws.onclose   = () => { setStatus("disconnected"); joinBtn.disabled = false; };
    ws.onerror   = () => { setStatus("disconnected"); joinBtn.disabled = false; };
  }

  // ── Processar mensagens do servidor ────────────────────────
  function tratarMensagem(dados) {

    // Confirmação de entrada: mostra o chat
    if (dados.type === "welcome") {
      isAdmin = dados.isAdmin;
      joinScreen.style.display = "none";
      chatScreen.classList.add("active");
      setStatus("connected");

      // Mostra botões do cabeçalho
      document.querySelectorAll(".header-btn").forEach(b => b.style.display = "flex");

      // Botão de jogo só aparece para o admin
      if (!isAdmin) gameBtn.style.display = "none";

    // Admin recebeu/atualizou a lista de palavras
    } else if (dados.type === "word_list") {
      renderizarPalavras(dados.words);

    // Mensagem de sistema (entrou, saiu, jogo começou)
    } else if (dados.type === "system") {
      adicionarSistema(dados.text);

    // Mensagem de chat
    } else if (dados.type === "message") {
      adicionarMensagem(dados);

    // Lista de usuários online atualizada
    } else if (dados.type === "user_list") {
      renderizarUsuarios(dados.users);

    // Jogo iniciou: mostra a tela de revelação
    } else if (dados.type === "game_start") {
      mostrarRevelacao(dados);

    // Jogo encerrado: esconde a revelação (se ainda estiver aberta)
    } else if (dados.type === "game_end") {
      revealScreen.classList.remove("show");
      // Reseta botões do admin
      startGameBtn.style.display = "block";
      endGameBtn.style.display = "none";

    // Erro do jogo (ex: poucos jogadores)
    } else if (dados.type === "game_error") {
      gameError.textContent = dados.text;
      gameError.classList.add("show");
      setTimeout(() => gameError.classList.remove("show"), 3000);

    // Admin foi promovido (o admin anterior saiu)
    } else if (dados.type === "promoted") {
      isAdmin = true;
      gameBtn.style.display = "flex";
      renderizarPalavras(dados.words);
    }
  }

  // ── Tela de revelação do jogo ──────────────────────────────
  // Cada jogador vê uma tela diferente:
  // - Jogador normal: vê a palavra
  // - Impostor: vê que é o impostor, sem a palavra
  // - Admin: vê a palavra E quem é o impostor
  function mostrarRevelacao(dados) {
    fecharTodosDrawers();

    if (dados.isImpostor) {
      // Sou o impostor
      revealScreen.className = "show impostor";
      revealCard.className   = "reveal-card impostor";
      revealRole.textContent = "👤 Seu papel";
      revealWord.textContent = "IMPOSTOR";
      revealHint.textContent = "Você não sabe a palavra. Tente convencer os outros de que sabe!";

    } else if (isAdmin && dados.impostorName) {
      // Sou o admin: vejo a palavra e o impostor
      revealScreen.className = "show admin-view";
      revealCard.className   = "reveal-card admin-view";
      revealRole.textContent = "👑 Visão do admin";
      revealWord.textContent = dados.word;
      revealHint.textContent = `Impostor: ${dados.impostorName}`;

    } else {
      // Jogador normal: vejo só a palavra
      revealScreen.className = "show";
      revealCard.className   = "reveal-card player";
      revealRole.textContent = "🟡 A palavra é";
      revealWord.textContent = dados.word;
      revealHint.textContent = "Lembre-se! Não diga a palavra diretamente — um impostor está entre vocês.";
    }

    revealScreen.classList.add("show");

    // Botões do admin mudam após iniciar o jogo
    if (isAdmin) {
      startGameBtn.style.display = "none";
      endGameBtn.style.display   = "block";
    }
  }

  // Botão "Entendi" fecha a tela de revelação
  revealClose.addEventListener("click", () => {
    revealScreen.classList.remove("show");
  });

  // ── Painel do admin: gerenciar palavras ────────────────────

  // Adiciona uma palavra à lista
  function adicionarPalavra() {
    const palavra = wordInput.value.trim();
    if (!palavra) return;
    ws.send(JSON.stringify({ type: "add_word", word: palavra }));
    wordInput.value = "";
  }
  addWordBtn.addEventListener("click", adicionarPalavra);
  wordInput.addEventListener("keydown", e => { if (e.key === "Enter") adicionarPalavra(); });

  // Renderiza a lista de palavras no painel do admin
  function renderizarPalavras(palavras) {
    if (palavras.length === 0) {
      wordListAdmin.innerHTML = `<span style="font-size:.8rem;color:var(--muted);font-family:var(--mono)">Nenhuma palavra ainda.</span>`;
      return;
    }
    wordListAdmin.innerHTML = "";
    palavras.forEach(p => {
      const tag = document.createElement("div");
      tag.className = "word-tag";

      const texto = document.createElement("span");
      texto.textContent = p;

      // Botão × para remover a palavra
      const remover = document.createElement("button");
      remover.className = "word-tag-remove";
      remover.textContent = "✕";
      remover.addEventListener("click", () => {
        ws.send(JSON.stringify({ type: "remove_word", word: p }));
      });

      tag.appendChild(texto);
      tag.appendChild(remover);
      wordListAdmin.appendChild(tag);
    });
  }

  // Inicia o jogo
  startGameBtn.addEventListener("click", () => {
    ws.send(JSON.stringify({ type: "start_game" }));
  });

  // Encerra o jogo
  endGameBtn.addEventListener("click", () => {
    ws.send(JSON.stringify({ type: "end_game" }));
  });

  // ── Chat ───────────────────────────────────────────────────
  function formatarHora(iso) {
    return new Date(iso).toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
  }

  function adicionarSistema(texto) {
    const el = document.createElement("div");
    el.className = "system-msg";
    el.textContent = texto;
    messagesEl.appendChild(el);
    rolarParaBaixo();
  }

  function adicionarMensagem(dados) {
    const minha = dados.from === myName;
    const bloco = document.createElement("div");
    bloco.className = "msg " + (minha ? "mine" : "other");

    const meta  = document.createElement("div"); meta.className = "msg-meta";
    const nome  = document.createElement("span"); nome.className = "msg-name";
    nome.style.color = dados.color;
    nome.textContent = minha ? "Você" : dados.from;
    const hora  = document.createElement("span"); hora.textContent = formatarHora(dados.time);
    meta.appendChild(nome); meta.appendChild(hora);

    const bolha = document.createElement("div"); bolha.className = "msg-bubble";
    bolha.textContent = dados.text;

    bloco.appendChild(meta); bloco.appendChild(bolha);
    messagesEl.appendChild(bloco);
    rolarParaBaixo();
  }

  function renderizarUsuarios(usuarios) {
    userListEl.innerHTML = "";
    usersCount.textContent = `${usuarios.length} online`;
    usuarios.forEach(u => {
      const item = document.createElement("div"); item.className = "user-item";
      const dot  = document.createElement("span"); dot.className = "user-dot"; dot.style.background = u.color;
      const nome = document.createElement("span");
      nome.className = "user-name" + (u.name === myName ? " me" : "");
      nome.textContent = u.name === myName ? u.name + " (você)" : u.name;
      item.appendChild(dot); item.appendChild(nome);
      // Mostra badge de admin ao lado do nome
      if (u.isAdmin) {
        const badge = document.createElement("span");
        badge.className = "admin-badge";
        badge.textContent = "admin";
        item.appendChild(badge);
      }
      userListEl.appendChild(item);
    });
  }

  function rolarParaBaixo() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function enviarMensagem() {
    const texto = msgInput.value.trim();
    if (!texto || !ws || ws.readyState !== 1) return;
    ws.send(JSON.stringify({ type: "message", text: texto }));
    msgInput.value = "";
    msgInput.style.height = "auto";
  }

  sendBtn.addEventListener("click", enviarMensagem);
  msgInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); enviarMensagem(); }
  });
  msgInput.addEventListener("input", () => {
    msgInput.style.height = "auto";
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + "px";
  });
</script>
</body>
</html>
